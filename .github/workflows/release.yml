name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: Build MinelaunchedStats
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Extract Tag Name
        id: extract_tag
        run: |
          RAW_TAG=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${RAW_TAG#v}
          echo "TAG_NAME=$RAW_TAG" >> $GITHUB_ENV
          echo "VERSION_NUM=$VERSION_NUM" >> $GITHUB_ENV

      - name: Update Versions dynamically
        run: |
          mvn versions:set -DnewVersion=${{ env.VERSION_NUM }}
          sed -i "s/^version: .*/version: ${{ env.VERSION_NUM }}/g" src/main/resources/plugin.yml

      - name: Build with Maven
        run: mvn clean package

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: MinelaunchedStats ${{ env.TAG_NAME }}
          files: ./target/MinelaunchedStats.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
