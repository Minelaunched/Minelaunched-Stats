name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: Build MinelaunchedStats
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Extract Tag Name
        id: extract_tag
        run: |
          RAW_TAG=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${RAW_TAG#v}
          echo "TAG_NAME=$RAW_TAG" >> $GITHUB_ENV
          echo "VERSION_NUM=$VERSION_NUM" >> $GITHUB_ENV

      - name: Update Versions dynamically
        run: |
          mvn versions:set -DnewVersion=${{ env.VERSION_NUM }}
          sed -i "s/^version: .*/version: ${{ env.VERSION_NUM }}/g" src/main/resources/plugin.yml

      - name: Build with Maven
        run: mvn clean package

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG_NAME }}
          release_name: MinelaunchedStats ${{ env.TAG_NAME }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./target/MinelaunchedStats.jar
          asset_name: MinelaunchedStats.jar
          asset_content_type: application/java-archive
