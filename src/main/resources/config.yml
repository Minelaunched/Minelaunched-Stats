# MinelaunchedStats Configuration
web:
  port: 8080
  endpoint: "/"
  pretty_print: false
  cors_origin: "*"

auto_updater:
  enabled: true
  # The GitHub repository from which to fetch updates.
  github_repo: "Minelaunched/Minelaunched-Stats"
  # Automatically restarts the server (via /restart) when an update is downloaded AND there are 0 players online.
  smart_restart: true

hooks:
  # Export Vault Economy balances (players) and total circulating economy (server).
  vault: true
  # Export LuckPerms primary group (rank), prefix and suffix for each player.
  luckperms: true
  # Export EssentialsX AFK, Vanished, GodMode, Muted, and Nickname states for each player.
  essentials: true
  placeholderapi:
    enabled: true
    # List custom PAPI placeholders to evaluate globally for the server (e.g. %server_online%).
    server_placeholders:
      - "%server_uptime%"
    # List custom PAPI placeholders to evaluate for EACH online player.
    player_placeholders:
      - "%player_ping%"
  # Export ViaVersion exact protocol version of each player.
  viaversion: true
  # Export Floodgate (Geyser) Bedrock status and device platform.
  floodgate: true
  # Export McMMO Power Level and skills.
  mcmmo: true
  # Export PlayerPoints balance (Premium Currency).
  playerpoints: true
  # Export GriefPrevention claim blocks and bonus claim blocks.
  griefprevention: true
  # Export AuraSkills (AureliumSkills) Mana and Global Level.
  auraskills: true

