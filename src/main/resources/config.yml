# MinelaunchedStats Configuration
web:
  port: 8080
  endpoint: "/"
  pretty_print: false
  cors_origin: "*"

auto_updater:
  enabled: true
  # The GitHub repository from which to fetch updates.
  github_repo: "Minelaunched/Minelaunched-Stats"
  # Automatically restarts the server (via /restart) when an update is downloaded AND there are 0 players online.
  smart_restart: true

hooks:
  vault:
    enabled: true
    export_player_balance: true
    export_server_economy: true
  
  placeholderapi:
    enabled: true
    # Global placeholders
    server_placeholders:
      - "%server_uptime%"
    # Per-player placeholders
    player_placeholders:
      - "%player_ping%"
      
  luckperms:
    enabled: true
    export_primary_group: true
    export_prefix: true
    export_suffix: true
    
  essentials:
    enabled: true
    export_afk: true
    export_vanish: true
    export_god_mode: true
    export_muted: true
    export_nickname: true

  cmi:
    enabled: true
    export_afk: true
    export_vanish: true
    export_god_mode: true

  viaversion:
    enabled: true
    export_protocol_version: true
    
  floodgate:
    enabled: true
    export_is_bedrock: true
    export_device_os: true
    
  mcmmo:
    enabled: true
    export_power_level: true
    
  auraskills:
    enabled: true
    export_mana: true
    export_power_level: true
    
  playerpoints:
    enabled: true
    export_balance: true
    
  griefprevention:
    enabled: true
    export_claim_blocks: true
    export_bonus_blocks: true
    
  towny:
    enabled: true
    export_town: true
    export_nation: true
    export_title: true
    
  jobsreborn:
    enabled: true
    export_jobs_list: true

